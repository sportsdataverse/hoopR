# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
# https://community.rstudio.com/new-topic?category=Package%20development&tags=github-actions
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '30 12 * * Fri'
name: R-CMD-check
permissions:
  contents: read
concurrency:
  group: r-cmd-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}
          # - {os: ubuntu-latest, r: 'oldrel-1'}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      KP_USER: ${{ secrets.KP_USER }}
      KP_PW: ${{ secrets.KP_PW }}
      R_KEEP_PKG_SOURCE: yes
      # Optional live API toggles for CI (tests still short-circuit on skip_on_ci() unless changed):
      # NBA_STATS_TESTS: ${{ secrets.NBA_STATS_TESTS }}
      # NBAGL_STATS_TESTS: ${{ secrets.NBAGL_STATS_TESTS }}
      # ESPN_TESTS: ${{ secrets.ESPN_TESTS }}
      # NCAA_MBB_TESTS: ${{ secrets.NCAA_MBB_TESTS }}

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
