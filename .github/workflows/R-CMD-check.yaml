# For help debugging build failures open an issue on the RStudio community with the 'github-actions' tag.
# https://community.rstudio.com/new-topic?category=Package%20development&tags=github-actions
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '30 12 * * Fri'

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
         # - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
         # - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      KP_USER: ${{ secrets.KP_USER }}
      KP_PW: ${{ secrets.KP_PW }}
      R_KEEP_PKG_SOURCE: yes
      # Note: NBA Stats, ESPN, G-League, and NCAA MBB tests are skipped on CI
      # via skip_on_ci(). To enable them, add these secrets and remove the
      # skip_on_ci() guard in the relevant test files:
      # NBA_STATS_TESTS: ${{ secrets.NBA_STATS_TESTS }}
      # ESPN_TESTS: ${{ secrets.ESPN_TESTS }}
      # NBAGL_STATS_TESTS: ${{ secrets.NBAGL_STATS_TESTS }}
      # NCAA_MBB_TESTS: ${{ secrets.NCAA_MBB_TESTS }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
